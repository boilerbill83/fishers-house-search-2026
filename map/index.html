<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Stoltenbergs House Hunt — Map</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }

    body { font-family: system-ui, -apple-system, sans-serif; height: 100vh; overflow: hidden; }

    #map { width: 100%; height: 100vh; }

    /* Toolbar */
    #toolbar {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border-radius: 12px;
      padding: 10px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    }

    #toolbar h1 {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1e293b;
      white-space: nowrap;
      margin-right: 4px;
    }

    .divider { width: 1px; height: 24px; background: #e2e8f0; }

    .filter-btn {
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active-filter { background: #2563eb; color: white; }
    .filter-btn.inactive-filter { background: #f1f5f9; color: #475569; }
    .filter-btn:hover { opacity: 0.85; }

    /* Stats */
    .stat { text-align: center; line-height: 1.2; }
    .stat-num { font-size: 1.1rem; font-weight: 800; }
    .stat-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-num.green { color: #16a34a; }
    .stat-num.amber { color: #d97706; }
    .stat-num.gray  { color: #94a3b8; }

    /* Legend */
    #legend {
      position: absolute;
      bottom: 32px;
      left: 16px;
      z-index: 10;
      background: white;
      border-radius: 10px;
      padding: 10px 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      font-size: 0.78rem;
    }
    #legend h3 { font-size: 0.72rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; color: #334155; font-weight: 500; }
    .legend-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.15); flex-shrink: 0; }

    /* Info window overrides */
    .gm-style .gm-style-iw-c { border-radius: 12px !important; padding: 0 !important; max-width: 280px !important; }
    .gm-style .gm-style-iw-d { overflow: hidden !important; }
    .gm-style .gm-style-iw-t::after { display: none; }</style></head><body><div id="map"></div><div id="toolbar"><h1>🏡 House Hunt Map</h1><div class="divider"></div><div class="stat"><div class="stat-num green" id="cnt-active">0</div><div class="stat-label">Active</div></div><div class="stat"><div class="stat-num amber" id="cnt-pending">0</div><div class="stat-label">Pending</div></div><div class="stat"><div class="stat-num gray" id="cnt-sold">0</div><div class="stat-label">Sold</div></div><div class="divider"></div><button class="filter-btn active-filter" id="btn-all" onclick="setFilter('all')">Show All</button> <button class="filter-btn inactive-filter" id="btn-active" onclick="setFilter('active')">Active Only</button></div><div id="legend"><h3>Legend</h3><div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Active</div><div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Pending</div><div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div>Sold</div><div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Your Home</div></div><script src="propertyData.js"></script><script>// ── PROPERTY DATA ────────────────────────────────────────────────────────────
// window.ALL_PROPERTIES is set by propertyData.js loaded via <script> tag above
// PROPERTIES is populated inside initMap to ensure the script has loaded
let PROPERTIES = [];

const YOUR_HOME = { address:"8038 Springwater Dr W", city:"Indianapolis, IN 46256", lat:39.93890, lng:-85.96270 };

// ── STATE ────────────────────────────────────────────────────────────────────
let map, markers = [], infoWindow, currentFilter = 'all';

// ── PIN COLORS ────────────────────────────────────────────────────────────────
function pinColor(status) {
  if (status === 'Active')  return { bg: '#22c55e', border: '#16a34a', text: '#fff' };
  if (status === 'Pending') return { bg: '#f59e0b', border: '#d97706', text: '#fff' };
  return                           { bg: '#94a3b8', border: '#64748b', text: '#fff' };
}

function makeSvgPin(status) {
  const c = pinColor(status);
  return {
    url: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="48" viewBox="0 0 36 48">
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"/>
        </filter>
        <path filter="url(#shadow)" d="M18 2 C8 2 2 10 2 18 C2 30 18 46 18 46 C18 46 34 30 34 18 C34 10 28 2 18 2 Z"
          fill="${c.bg}" stroke="${c.border}" stroke-width="2"/>
        <circle cx="18" cy="18" r="6" fill="white" opacity="0.5"/>
      </svg>
    `)}`,
    scaledSize: new google.maps.Size(36, 48),
    anchor: new google.maps.Point(18, 46),
  };
}

function makeHomePinSvg() {
  const c = { bg: '#3b82f6', border: '#1d4ed8' };
  return {
    url: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="48" viewBox="0 0 36 48">
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"/>
        </filter>
        <path filter="url(#shadow)" d="M18 2 C8 2 2 10 2 18 C2 30 18 46 18 46 C18 46 34 30 34 18 C34 10 28 2 18 2 Z"
          fill="${c.bg}" stroke="${c.border}" stroke-width="2"/>
        <circle cx="18" cy="18" r="6" fill="white" opacity="0.5"/>
      </svg>
    `)}`,
    scaledSize: new google.maps.Size(36, 48),
    anchor: new google.maps.Point(18, 46),
  };
}

// ── INFO WINDOW CONTENT ───────────────────────────────────────────────────────
function infoContent(p) {
  const c = pinColor(p.status);
  const statusBadge = p.status === 'Active'
    ? `<span style="background:#dcfce7;color:#166534;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700">● Active</span>`
    : p.status === 'Pending'
    ? `<span style="background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700">● Pending</span>`
    : `<span style="background:#f1f5f9;color:#475569;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700">● Sold</span>`;

  return `
    <div style="font-family:system-ui,sans-serif;padding:14px 16px;min-width:230px;max-width:270px">
      <div style="margin-bottom:6px">
        <div style="font-weight:700;font-size:14px;color:#1e293b;line-height:1.3">${p.address}</div>
      </div>
      <div style="color:#64748b;font-size:12px;margin-bottom:8px">${p.neighborhood}</div>
      <div style="font-size:22px;font-weight:800;color:#2563eb;margin-bottom:6px">
        $${Math.round(p.price/1000)}K
        <span style="font-size:12px;color:#64748b;font-weight:500;margin-left:4px">$${Math.round(p.price/p.sqft)}/sqft</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px;background:#f8fafc;border-radius:8px;padding:6px">
        <div style="text-align:center;font-size:11px"><div style="font-weight:700;color:#1e293b">${p.beds}</div><div style="color:#94a3b8">beds</div></div>
        <div style="text-align:center;font-size:11px"><div style="font-weight:700;color:#1e293b">${p.baths}</div><div style="color:#94a3b8">baths</div></div>
        <div style="text-align:center;font-size:11px"><div style="font-weight:700;color:#1e293b">${p.garage}</div><div style="color:#94a3b8">garage</div></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        ${statusBadge}
        <a href="${p.zillow}" target="_blank"
          style="background:#2563eb;color:white;padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;text-decoration:none">
          View on Zillow ↗
        </a>
      </div>
    </div>`;
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.getElementById('btn-all').className    = `filter-btn ${f==='all'    ? 'active-filter' : 'inactive-filter'}`;
  document.getElementById('btn-active').className = `filter-btn ${f==='active' ? 'active-filter' : 'inactive-filter'}`;
  markers.forEach(({ marker, property }) => {
    const show = f === 'all' || property.status === 'Active';
    marker.setVisible(show);
  });
  if (infoWindow) infoWindow.close();
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('cnt-active').textContent  = PROPERTIES.filter(p => p.status === 'Active').length;
  document.getElementById('cnt-pending').textContent = PROPERTIES.filter(p => p.status === 'Pending').length;
  document.getElementById('cnt-sold').textContent    = PROPERTIES.filter(p => p.status === 'Sold').length;
}

// ── INIT MAP ──────────────────────────────────────────────────────────────────
function initMap() {
  // Build PROPERTIES from window.ALL_PROPERTIES (set by propertyData.js)
  PROPERTIES = (window.ALL_PROPERTIES || []).map(p => ({
    ...p,
    zillow: p.zillowLink,
  }));

  if (PROPERTIES.length === 0) {
    console.error('propertyData.js failed to load — window.ALL_PROPERTIES is empty');
  }

  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 39.9600, lng: -85.9750 },
    zoom: 12,
    mapTypeId: 'roadmap',
    mapTypeControl: true,
    mapTypeControlOptions: {
      style: google.maps.MapTypeControlStyle.HORIZONTAL_BAR,
      position: google.maps.ControlPosition.TOP_RIGHT,
    },
    fullscreenControl: false,
    streetViewControl: true,
    zoomControl: true,
    zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_CENTER },
    styles: [
      { featureType: "poi.business", stylers: [{ visibility: "off" }] },
      { featureType: "poi.park", elementType: "labels.icon", stylers: [{ visibility: "off" }] },
    ],
  });

  infoWindow = new google.maps.InfoWindow({ pixelOffset: new google.maps.Size(0, -8) });

  const bounds = new google.maps.LatLngBounds();

  // Plot properties
  PROPERTIES.forEach(p => {
    const pos = { lat: p.lat, lng: p.lng };
    const marker = new google.maps.Marker({
      position: pos,
      map,
      icon: makeSvgPin(p.status),
      title: p.address,
      zIndex: p.status === 'Active' ? 10 : 5,
    });

    marker.addListener('click', () => {
      infoWindow.setContent(infoContent(p));
      infoWindow.open(map, marker);
    });

    markers.push({ marker, property: p });
    bounds.extend(pos);
  });

  // Your current home
  const homeMarker = new google.maps.Marker({
    position: { lat: YOUR_HOME.lat, lng: YOUR_HOME.lng },
    map,
    icon: makeHomePinSvg(),
    title: 'Your Current Home',
    zIndex: 20,
  });
  homeMarker.addListener('click', () => {
    infoWindow.setContent(`
      <div style="font-family:system-ui,sans-serif;padding:12px 14px">
        <div style="font-weight:700;font-size:13px;color:#1e293b;margin-bottom:4px">Your Current Home</div>
        <div style="color:#64748b;font-size:12px">${YOUR_HOME.address}</div>
        <div style="color:#64748b;font-size:12px">${YOUR_HOME.city}</div>
      </div>`);
    infoWindow.open(map, homeMarker);
  });
  bounds.extend({ lat: YOUR_HOME.lat, lng: YOUR_HOME.lng });

  // Fit map to all pins with padding
  map.fitBounds(bounds, { top: 80, right: 40, bottom: 60, left: 40 });

  updateStats();

  // Close info window on map click
  map.addListener('click', () => infoWindow.close());
}</script><script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC5jgMY8Y8I2sDKeLZpbywj_a7IS-BOHC4&callback=initMap&v=weekly" async defer="defer"></script></body></html>
