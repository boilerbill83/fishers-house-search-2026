<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stoltenbergs House Hunt — Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    #toolbar {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 6px;
      background: white; border-radius: 12px; padding: 10px 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      width: max-content; max-width: calc(100vw - 32px);
    }
    #toolbar-row1 { display: flex; align-items: center; gap: 8px; }
    #toolbar-row2 { display: flex; align-items: center; gap: 6px; }
    #toolbar h1 { font-size: 0.88rem; font-weight: 700; color: #1e293b; white-space: nowrap; }
    .divider { width: 1px; height: 20px; background: #e2e8f0; }
    .stat { text-align: center; line-height: 1.2; }
    .stat-num { font-size: 1rem; font-weight: 800; }
    .stat-label { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-num.green { color: #16a34a; }
    .stat-num.amber { color: #d97706; }
    .stat-num.gray  { color: #94a3b8; }
    .stat-num.pink  { color: #ec4899; }

    .filter-btn {
      border: none; border-radius: 8px; padding: 5px 12px;
      font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .filter-btn.active-filter { background: #2563eb; color: white; }
    .filter-btn.inactive-filter { background: #f1f5f9; color: #475569; }
    .filter-btn:hover { opacity: 0.85; }

    #map-type-btns {
      position: absolute; top: 12px; right: 12px; z-index: 10;
      display: flex; gap: 3px; background: white; border-radius: 10px;
      padding: 4px; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .map-type-btn {
      border: none; border-radius: 7px; padding: 5px 9px;
      font-size: 0.72rem; font-weight: 600; cursor: pointer;
      transition: all 0.15s; background: transparent; color: #475569; white-space: nowrap;
    }
    .map-type-btn:hover { background: #f1f5f9; }
    .map-type-btn.active-type { background: #2563eb; color: white; }

    #legend {
      position: absolute; bottom: 32px; left: 16px; z-index: 10;
      background: white; border-radius: 10px; padding: 10px 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15); font-size: 0.78rem;
    }
    #legend h3 { font-size: 0.72rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; color: #334155; font-weight: 500; }
    .legend-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.15); flex-shrink: 0; }

    .gm-style .gm-style-iw-c { border-radius: 12px !important; padding: 0 !important; max-width: 280px !important; }
    .gm-style .gm-style-iw-d { overflow: hidden !important; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="toolbar">
  <div id="toolbar-row1">
    <h1>🏡 House Hunt Map</h1>
    <div class="divider"></div>
    <div class="stat"><div class="stat-num green" id="cnt-active">0</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-num amber" id="cnt-pending">0</div><div class="stat-label">Pending</div></div>
    <div class="stat"><div class="stat-num gray" id="cnt-sold">0</div><div class="stat-label">Sold</div></div>
    <div class="stat"><div class="stat-num pink" id="cnt-favorites">0</div><div class="stat-label">Saved</div></div>
  </div>
  <div id="toolbar-row2">
    <button class="filter-btn inactive-filter" id="btn-all" onclick="setFilter('all')">Show All</button>
    <button class="filter-btn active-filter" id="btn-active" onclick="setFilter('active')">Active Only</button>
    <button class="filter-btn inactive-filter" id="btn-favorites" onclick="setFilter('favorites')" style="background:#fce7f3;color:#be185d;">&#9829; Saved</button>
  </div>
</div>

<div id="map-type-btns">
  <button class="map-type-btn active-type" id="btn-roadmap"   onclick="setMapType('roadmap')">Road</button>
  <button class="map-type-btn"             id="btn-satellite" onclick="setMapType('satellite')">Satellite</button>
  <button class="map-type-btn"             id="btn-hybrid"    onclick="setMapType('hybrid')">Hybrid</button>
  <button class="map-type-btn"             id="btn-terrain"   onclick="setMapType('terrain')">Terrain</button>
</div>

<div id="legend">
  <h3>Legend</h3>
  <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Active</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Pending</div>
  <div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div>Sold</div>
  <div class="legend-item"><div style="font-size:14px;line-height:1">&#9829;</div><span style="color:#be185d;font-weight:600">Saved</span></div>
</div>

<script>
<%= propertyDataInline %>
</script>

<script>
var map, markers = [], infoWindow, currentFilter = 'active';
var PROPERTIES = [];
var favorites = JSON.parse(localStorage.getItem('houseFavorites') || '[]');

function pinColor(status) {
  if (status === 'Active')  return { bg: '#22c55e', border: '#16a34a' };
  if (status === 'Pending') return { bg: '#f59e0b', border: '#d97706' };
  return { bg: '#94a3b8', border: '#64748b' };
}

function makePinIcon(status, price, isFavorite) {
  var c = pinColor(status);
  var label = '$' + Math.round(price / 1000) + 'K';
  var border = isFavorite ? '#db2777' : c.border;
  var bw = isFavorite ? '2.5' : '1.5';
  var heartBadge = isFavorite
    ? '<circle cx="63" cy="10" r="9" fill="#ec4899" stroke="white" stroke-width="1.5"/>'
      + '<text x="63" y="14.5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="white">\u2665</text>'
    : '';
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="72" height="58" viewBox="0 0 72 58">'
    + '<rect x="1" y="1" width="70" height="38" rx="8" ry="8" fill="' + c.bg + '" stroke="' + border + '" stroke-width="' + bw + '"/>'
    + '<polygon points="29,39 43,39 36,52" fill="' + c.bg + '" stroke="' + border + '" stroke-width="' + bw + '"/>'
    + '<polygon points="30,38 42,38 36,50" fill="' + c.bg + '"/>'
    + '<text x="36" y="25" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="white">' + label + '</text>'
    + heartBadge
    + '</svg>';
  return {
    url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
    scaledSize: status === 'Active' ? new google.maps.Size(72, 58) : new google.maps.Size(44, 35),
    anchor: status === 'Active' ? new google.maps.Point(36, 57) : new google.maps.Point(22, 34),
  };
}

function infoContent(p) {
  var isFav = favorites.indexOf(p.id) !== -1;
  var statusBadge = p.status === 'Active'
    ? '<span style="background:#dcfce7;color:#166534;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700">&#9679; Active</span>'
    : p.status === 'Pending'
    ? '<span style="background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700">&#9679; Pending</span>'
    : '<span style="background:#f1f5f9;color:#475569;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700">&#9679; Sold</span>';
  var favBadge = isFav ? '<span style="background:#fce7f3;color:#be185d;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700">\u2665 Saved</span> ' : '';
  return '<div style="font-family:system-ui,sans-serif;padding:14px 16px;min-width:230px;max-width:270px">'
    + '<div style="font-weight:700;font-size:14px;color:#1e293b;margin-bottom:4px">' + favBadge + p.address + '</div>'
    + '<div style="color:#64748b;font-size:12px;margin-bottom:8px">' + p.neighborhood + '</div>'
    + '<div style="font-size:22px;font-weight:800;color:#2563eb;margin-bottom:6px">$' + Math.round(p.price/1000) + 'K'
    + '<span style="font-size:12px;color:#64748b;font-weight:500;margin-left:4px">$' + Math.round(p.price/p.sqft) + '/sqft</span></div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px;background:#f8fafc;border-radius:8px;padding:6px">'
    + '<div style="text-align:center;font-size:11px"><div style="font-weight:700;color:#1e293b">' + p.beds + '</div><div style="color:#94a3b8">beds</div></div>'
    + '<div style="text-align:center;font-size:11px"><div style="font-weight:700;color:#1e293b">' + p.baths + '</div><div style="color:#94a3b8">baths</div></div>'
    + '<div style="text-align:center;font-size:11px"><div style="font-weight:700;color:#1e293b">' + p.garage + '</div><div style="color:#94a3b8">garage</div></div>'
    + '</div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center">'
    + statusBadge
    + '<a href="' + p.zillowLink + '" target="_blank" style="background:#2563eb;color:white;padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;text-decoration:none">View on Zillow &#8599;</a>'
    + '</div></div>';
}

function setFilter(f) {
  currentFilter = f;
  document.getElementById('btn-all').className      = 'filter-btn ' + (f === 'all'       ? 'active-filter' : 'inactive-filter');
  document.getElementById('btn-active').className   = 'filter-btn ' + (f === 'active'    ? 'active-filter' : 'inactive-filter');
  var favBtn = document.getElementById('btn-favorites');
  if (f === 'favorites') {
    favBtn.className = 'filter-btn active-filter';
    favBtn.style.background = ''; favBtn.style.color = '';
  } else {
    favBtn.className = 'filter-btn inactive-filter';
    favBtn.style.background = '#fce7f3'; favBtn.style.color = '#be185d';
  }
  markers.forEach(function(m) {
    var visible = f === 'all'
      || (f === 'active' && m.property.status === 'Active')
      || (f === 'favorites' && favorites.indexOf(m.property.id) !== -1);
    m.marker.setVisible(visible);
  });
  if (infoWindow) infoWindow.close();
}

function setMapType(type) {
  map.setMapTypeId(type);
  ['roadmap','satellite','hybrid','terrain'].forEach(function(t) {
    document.getElementById('btn-' + t).className = 'map-type-btn' + (t === type ? ' active-type' : '');
  });
}

function updateStats() {
  document.getElementById('cnt-active').textContent    = PROPERTIES.filter(function(p){ return p.status === 'Active'; }).length;
  document.getElementById('cnt-pending').textContent   = PROPERTIES.filter(function(p){ return p.status === 'Pending'; }).length;
  document.getElementById('cnt-sold').textContent      = PROPERTIES.filter(function(p){ return p.status === 'Sold'; }).length;
  document.getElementById('cnt-favorites').textContent = favorites.filter(function(id){ return PROPERTIES.some(function(p){ return p.id === id; }); }).length;
}

function initMap() {
  PROPERTIES = (window.ALL_PROPERTIES || []);

  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 39.9600, lng: -85.9750 },
    zoom: 12,
    mapTypeId: 'roadmap',
    mapTypeControl: false,
    fullscreenControl: false,
    streetViewControl: true,
    zoomControl: true,
    zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_CENTER },
    styles: [
      { featureType: "poi.business", stylers: [{ visibility: "off" }] },
    ],
  });

  infoWindow = new google.maps.InfoWindow({ pixelOffset: new google.maps.Size(0, -4) });

  var bounds = new google.maps.LatLngBounds();

  PROPERTIES.forEach(function(p) {
    var isFav = favorites.indexOf(p.id) !== -1;
    var pos = { lat: p.latitude, lng: p.longitude };
    var marker = new google.maps.Marker({
      position: pos,
      map: map,
      icon: makePinIcon(p.status, p.price, isFav),
      title: p.address,
      zIndex: isFav ? 20 : (p.status === 'Active' ? 10 : 5),
    });
    marker.addListener('click', function() {
      infoWindow.setContent(infoContent(p));
      infoWindow.open(map, marker);
    });
    markers.push({ marker: marker, property: p });
    bounds.extend(pos);
  });

  // Apply default active-only filter
  markers.forEach(function(m) {
    m.marker.setVisible(m.property.status === 'Active');
  });

  // Fit bounds to active only
  var activeBounds = new google.maps.LatLngBounds();
  markers.forEach(function(m) {
    if (m.property.status === 'Active') activeBounds.extend(m.marker.getPosition());
  });
  map.fitBounds(activeBounds, { top: 80, right: 60, bottom: 60, left: 40 });

  updateStats();
  map.addListener('click', function() { infoWindow.close(); });
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC5jgMY8Y8I2sDKeLZpbywj_a7IS-BOHC4&callback=initMap&v=weekly" async defer></script>

</body>
</html>
